version: "3"

services:
  app:
    build: .
    depends_on:
      - db
    environment:
      USER: odoo
      PASSWORD: odoo 
      HOST: db
    ports:
      - "8069:8069"
    volumes:
      - ./:/mnt/extra-addons
      - ./config:/etc/odoo
      - odoo-web-data:/var/lib/odoo
  db:
    image: postgres:9.5-alpine
    restart: always
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
volumes:
  odoo-web-data:
  odoo-db-data: